# .github/workflows/atena_daily_scrape.yml
# Atena Legal AI — Daily autonomous scraping + embedding job
# Runs every night at 02:00 UTC (03:00 CET) on GitHub's servers
# ZERO cost for compute — uses GitHub's free minutes (2000 min/month)
# 
# SETUP (once):
# Go to your GitHub repo → Settings → Secrets and variables → Actions
# Add the following repository secrets:
#   GEMINI_API_KEY
#   SUPABASE_URL
#   SUPABASE_KEY
#   PINECONE_API_KEY
#   PERPLEXITY_API_KEY

name: Atena Daily Legal Scrape & Embed

on:
  schedule:
    # Every day at 02:00 UTC = 03:00 CET (winter) / 04:00 CEST (summer)
    - cron: '0 2 * * *'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: full (4h) or quick (30min test)'
        required: false
        default: 'full'

jobs:
  scrape_and_embed:
    name: Legal Knowledge Expansion
    runs-on: ubuntu-latest
    timeout-minutes: 270  # 4.5 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'atena_autoresearch/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r atena_autoresearch/requirements.txt

      - name: Create .env file from secrets
        run: |
          cat > picoclaw_agents/.env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          EOF

      - name: Run Auto-Scrape & Embed Pipeline
        working-directory: atena_autoresearch
        run: |
          python -u auto_scrape_and_embed.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload session report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-session-${{ github.run_id }}
          path: |
            atena_autoresearch/scrape_sessions.jsonl
            atena_autoresearch/scrape_run.log
            atena_autoresearch/embed_checkpoint.json
          retention-days: 30

      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "::error::Atena daily scrape failed. Check logs above."
